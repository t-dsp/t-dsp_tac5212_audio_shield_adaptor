<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>T-DSP TAC5212 Audio Shield - 3D Renders</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  header { text-align: center; padding: 1.5rem 1rem 0.5rem; }
  header h1 { font-size: 1.4rem; font-weight: 600; }
  header p { font-size: 0.85rem; color: #888; margin-top: 0.3rem; }
  header a { color: #6ba3e8; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  .tabs { display: flex; justify-content: center; gap: 0.5rem; padding: 1rem; }
  .tab { padding: 0.5rem 1.2rem; border: 1px solid #444; border-radius: 6px; background: transparent;
         color: #ccc; cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
  .tab:hover { border-color: #777; }
  .tab.active { background: #2a5a9a; border-color: #2a5a9a; color: #fff; }

  .viewer { position: relative; display: flex; align-items: center; justify-content: center;
            max-width: 1200px; margin: 0 auto; padding: 0 3rem; min-height: 50vh; }
  .viewer img { max-width: 100%; max-height: 70vh; object-fit: contain; border-radius: 4px;
                transition: opacity 0.2s; }

  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.08);
             border: 1px solid rgba(255,255,255,0.15); color: #ccc; width: 44px; height: 44px;
             border-radius: 50%; cursor: pointer; font-size: 1.3rem; display: flex;
             align-items: center; justify-content: center; transition: all 0.15s; }
  .nav-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-btn.prev { left: 0.5rem; }
  .nav-btn.next { right: 0.5rem; }

  .caption { text-align: center; padding: 0.8rem; font-size: 0.95rem; color: #aaa; }
  .caption strong { color: #ddd; }

  .thumbs { display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem;
            padding: 0.5rem 1rem 2rem; max-width: 1000px; margin: 0 auto; }
  .thumb { width: 80px; height: 60px; border: 2px solid transparent; border-radius: 4px;
           cursor: pointer; overflow: hidden; opacity: 0.5; transition: all 0.15s; }
  .thumb:hover { opacity: 0.8; }
  .thumb.active { border-color: #2a5a9a; opacity: 1; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }

  footer { text-align: center; padding: 1rem; font-size: 0.75rem; color: #555; }
  footer a { color: #6ba3e8; text-decoration: none; }

  @media (max-width: 600px) {
    .viewer { padding: 0 2.5rem; }
    .thumb { width: 60px; height: 45px; }
    header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>T-DSP TAC5212 Audio Shield for Teensy 4.1</h1>
  <p>3D Blender Renders &mdash; <a href="https://github.com/t-dsp/t-dsp_tac5212_audio_shield_adaptor">GitHub</a></p>
</header>

<div class="tabs">
  <button class="tab active" data-set="th">All Components</button>
  <button class="tab" data-set="smd">SMD Only</button>
</div>

<div class="viewer">
  <button class="nav-btn prev" aria-label="Previous">&lsaquo;</button>
  <img id="main-img" src="" alt="3D Render">
  <button class="nav-btn next" aria-label="Next">&rsaquo;</button>
</div>

<div class="caption" id="caption"></div>

<div class="thumbs" id="thumbs"></div>

<footer>
  Generated by <a href="https://github.com/INTI-CMNB/KiBot">KiBot</a> +
  <a href="https://www.blender.org">Blender</a> &mdash;
  <a href="ibom.html">Interactive BOM</a>
</footer>

<script>
(function() {
  var prefix = 'renders/t-dsp_tac5212_audio_shield_adaptor-3D_blender_';
  var viewSets = {
    th: [
      { id: 'top',        label: 'Top' },
      { id: 'bottom',     label: 'Bottom' },
      { id: 'front',      label: 'Front' },
      { id: 'rear',       label: 'Rear' },
      { id: 'left',       label: 'Left' },
      { id: 'right',      label: 'Right' },
      { id: 'top_iso',    label: 'Top Isometric' },
      { id: 'bottom_iso', label: 'Bottom Isometric' }
    ],
    smd: [
      { id: 'top',        label: 'Top' },
      { id: 'bottom',     label: 'Bottom' },
      { id: 'top_iso',    label: 'Top Isometric' },
      { id: 'bottom_iso', label: 'Bottom Isometric' }
    ]
  };

  var currentSet = 'th';
  var currentIdx = 0;

  function getViews() { return viewSets[currentSet]; }

  function getImages() {
    return getViews().map(function(v) {
      return { src: prefix + currentSet + '_' + v.id + '.png', label: v.label };
    });
  }

  function render() {
    var images = getImages();
    var img = document.getElementById('main-img');
    var caption = document.getElementById('caption');
    var thumbsEl = document.getElementById('thumbs');

    img.src = images[currentIdx].src;
    var setLabel = currentSet === 'th' ? 'All Components' : 'SMD Only';
    caption.innerHTML = '<strong>' + images[currentIdx].label + '</strong> &mdash; ' + setLabel;

    thumbsEl.innerHTML = '';
    images.forEach(function(item, i) {
      var div = document.createElement('div');
      div.className = 'thumb' + (i === currentIdx ? ' active' : '');
      div.innerHTML = '<img src="' + item.src + '" alt="' + item.label + '">';
      div.onclick = function() { currentIdx = i; render(); };
      thumbsEl.appendChild(div);
    });

    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.dataset.set === currentSet);
    });
  }

  function navigate(dir) {
    var len = getViews().length;
    currentIdx = (currentIdx + dir + len) % len;
    render();
  }

  document.querySelector('.prev').onclick = function() { navigate(-1); };
  document.querySelector('.next').onclick = function() { navigate(1); };

  document.querySelectorAll('.tab').forEach(function(t) {
    t.onclick = function() { currentSet = t.dataset.set; currentIdx = 0; render(); };
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === 'ArrowRight') navigate(1);
  });

  render();
})();
</script>
</body>
</html>
